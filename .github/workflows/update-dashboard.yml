name: Update OT Dashboard Data

# Chạy tự động mỗi khi file Excel (.xlsx) ở gốc repo được cập nhật trên
# nhánh main, và có thể chạy tay từ tab Actions.
on:
  push:
    branches: [main]
    paths:
      - "*.xlsx"
      - "parse_excel.py"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-dashboard-data
  cancel-in-progress: true

jobs:
  parse-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install openpyxl

      - name: Find the attendance workbook
        id: find_xlsx
        run: |
          FILE=$(ls *.xlsx | head -n 1)
          if [ -z "$FILE" ]; then
            echo "Không tìm thấy file .xlsx nào ở gốc repo." >&2
            exit 1
          fi
          echo "Found workbook: $FILE"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"

      - name: Parse workbook into dashboard_data.json
        run: |
          python parse_excel.py "${{ steps.find_xlsx.outputs.file }}" dashboard_data.json

      - name: Commit updated data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard_data.json
          if git diff --cached --quiet; then
            echo "Không có thay đổi dữ liệu để commit."
          else
            git commit -m "chore: auto-update dashboard data [skip ci]"
            git push
          fi
